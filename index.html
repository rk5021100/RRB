<!DOCTYPE html>
<html>
<head>
    <title>RRB JE Mini Mock Test</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        #timer { font-size: 20px; color: red; }
        .question-box { margin-top: 20px; }
        button { padding: 8px 15px; margin: 5px; }
        #resultPage { display: none; }
    </style>
</head>
<body>

<h2>RRB JE Mini Mock Test</h2>
<div id="timer"></div>

<div id="examPage">
    <div class="question-box">
        <p id="questionText"></p>
        <div id="options"></div>
    </div>

    <button onclick="prevQuestion()">Previous</button>
    <button onclick="nextQuestion()">Next</button>
    <button onclick="submitQuiz()">Submit Test</button>
</div>

<div id="resultPage">
    <h2>Score Card</h2>
    <p id="attempted"></p>
    <p id="correct"></p>
    <p id="wrong"></p>
    <p id="marks"></p>
</div>

<script>

const questions = [
{
question: "For the life processes, the transfer of a source of energy from outside the body of the
organism is called _______ .",
options: ["excretion","respiration","digestion","nutrition"],
answer: "nutrition"
},
{
question: "For a trip of 600 km, a truck travels the first 300 km at a speed of 42 km/hr. At what
speed (in km/hr) should it cover the remaining distance, so that the average speed for
the entire journey is 63 km/hr?",
options: ["126","141","101","106"],
answer: "126"
},
{
question: "Find the simple interest (in ₹) on ₹4,000 at 6% per annum rate of interest for the period
from 21 February 2024 to 22 April 2024.",
options: ["41","38","39","40"],
answer: "40"
},
{
question: "4What should come in place of the question mark (?) in the given series based on the
English alphabetical order?
FCA HEC JGE LIG  ?",
options: ["NKI","NKJ","NLJ","NLI"],
answer: "NKI"
},
{
question: "Rajesh ranked 17th from the top and 44th from the bottom in his class. How many
students are there in his class?",
options: ["61","60","59","58"],
answer: "60"
},
{
question: "O, P, Q, R, S, T and X are sitting around a circular table facing the centre of the table.
Only one person sits between Q and X when counted from the left of X. P sits third to
the right of R. O sits third to the left of T. P sits to the immediate right of O. S is not an
immediate neighbour of O. How many people sit between S and X when counted from
the right of S?",
options: ["Two","One","Three","Four"],
answer: "Three"
},
{
question: "One pipe can fill the tank in 9 minutes while another pipe can empty completely filled
tank in 90 minutes. If both the pipes are operated together on empty tank, how long (in
minutes) will it take to fill half of the tank ?",
options: ["5","10","6","11"],
answer: "5"
},
{
question: "A, B, C, D, G, H, and I are sitting around a circular table facing the centre.
B sits third to the left of I. G sits second to the left of H. Only I sits between A and G. C is
not an immediate neighbor of B. How many people sit between D and G when counted
from the right of D ?",
options: ["Four","One","Two","Three"],
answer: "Two"
},
{
question: "Tanveer starts from Point B and drives 2 km towards west. He then takes a right turn,
drives 4 km, turns left and drives 5 km. He then takes a right turn and drives 3 km. He
takes a final right turn, drives 7 km and stops at Point P. How far (shortest distance) and
towards which direction should he drive in order to reach Point B again (all turns are
90° turns only unless specified) ?",
options: ["5 km south","7 km south","6 km south","4 km south"],
answer: "7 km south"
},
{
question: "Poonam sold a book to Mohini at a loss of 5% and Mohini sold it to Rupashi at a profit
of 8%. If Rupashi bought the book for ₹1,539, then what was the cost price (in ₹) of the
book for Poonam ?",
options: ["1600","1550","1500","1650"],
answer: "1500"
}
];

let currentQuestion = 0;
let userAnswers = new Array(questions.length).fill(null);
let timeLeft = 540; // 9 minutes

function loadQuestion() {
    document.getElementById("questionText").innerText =
        (currentQuestion + 1) + ". " + questions[currentQuestion].question;

    const optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML = "";

    questions[currentQuestion].options.forEach(option => {
        let checked = userAnswers[currentQuestion] === option ? "checked" : "";
        optionsDiv.innerHTML += `
            <input type="radio" name="option" value="${option}" ${checked}
            onclick="saveAnswer('${option}')"> ${option}<br>`;
    });
}

function saveAnswer(option) {
    userAnswers[currentQuestion] = option;
}

function nextQuestion() {
    if (currentQuestion < questions.length - 1) {
        currentQuestion++;
        loadQuestion();
    }
}

function prevQuestion() {
    if (currentQuestion > 0) {
        currentQuestion--;
        loadQuestion();
    }
}

function submitQuiz() {
    clearInterval(timer);

    let attempted = 0;
    let correct = 0;

    userAnswers.forEach((ans, index) => {
        if (ans !== null) {
            attempted++;
            if (ans === questions[index].answer) {
                correct++;
            }
        }
    });

    let wrong = attempted - correct;
    let marks = correct; // no negative marking yet

    document.getElementById("examPage").style.display = "none";
    document.getElementById("resultPage").style.display = "block";

    document.getElementById("attempted").innerText = "Attempted: " + attempted;
    document.getElementById("correct").innerText = "Correct: " + correct;
    document.getElementById("wrong").innerText = "Wrong: " + wrong;
    document.getElementById("marks").innerText = "Marks: " + marks + " / " + questions.length;
}

let timer = setInterval(function() {
    let minutes = Math.floor(timeLeft / 60);
    let seconds = timeLeft % 60;

    document.getElementById("timer").innerText =
        "Time Left: " + minutes + ":" +
        (seconds < 10 ? "0" : "") + seconds;

    timeLeft--;

    if (timeLeft < 0) {
        submitQuiz();
    }
}, 1000);

loadQuestion();

</script>

</body>
</html>
