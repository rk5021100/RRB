<!DOCTYPE html>
<html>
<head>
    <title>RRB JE Mini Mock Test</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        #timer { font-size: 20px; color: red; }
        .question-box { margin-top: 20px; }
        button { padding: 8px 15px; margin: 5px; }
        #resultPage { display: none; }
    </style>
</head>
<body>

<h2>RRB JE Mini Mock Test</h2>
<div id="timer"></div>

<div id="examPage">
    <div class="question-box">
        <p id="questionText"></p>
        <div id="options"></div>
    </div>

    <button onclick="prevQuestion()">Previous</button>
    <button onclick="nextQuestion()">Next</button>
    <button onclick="submitQuiz()">Submit Test</button>
</div>

<div id="resultPage">
    <h2>Score Card</h2>
    <p id="attempted"></p>
    <p id="correct"></p>
    <p id="wrong"></p>
    <p id="marks"></p>
</div>

<script>

const questions = [
{
question: "For the life processes, the transfer of a source of energy from outside the body of the
organism is called _______ .",
options: ["excretion","respiration","digestion","nutrition"],
answer: "nutrition"
},
{
const questions = [
{
question: `For the life processes, the transfer of a source of energy from outside the body of the organism is called _______.`,
options: ["excretion","respiration","digestion","nutrition"],
answer: "nutrition"
},
{
question: `For a trip of 600 km, a truck travels the first 300 km at a speed of 42 km/hr. At what speed should it cover the remaining distance so that the average speed for the entire journey is 63 km/hr?`,
options: ["126","141","101","106"],
answer: "126"
},
{
question: `Find the simple interest on 4000 rupees at 6 percent per annum rate of interest from 21 February 2024 to 22 April 2024.`,
options: ["41","38","39","40"],
answer: "40"
},
{
question: `What should come in place of the question mark in the series: FCA HEC JGE LIG ?`,
options: ["NKI","NKJ","NLJ","NLI"],
answer: "NKI"
},
{
question: `Rajesh ranked 17th from the top and 44th from the bottom in his class. How many students are there in his class?`,
options: ["61","60","59","58"],
answer: "60"
},
{
question: `O, P, Q, R, S, T and X are sitting around a circular table facing the centre. How many people sit between S and X when counted from the right of S?`,
options: ["Two","One","Three","Four"],
answer: "Three"
},
{
question: `One pipe can fill the tank in 9 minutes while another pipe can empty a completely filled tank in 90 minutes. If both pipes operate together, how long will it take to fill half the tank?`,
options: ["5","10","6","11"],
answer: "5"
},
{
question: `A, B, C, D, G, H and I are sitting around a circular table facing the centre. How many people sit between D and G when counted from the right of D?`,
options: ["Four","One","Two","Three"],
answer: "Two"
},
{
question: `Tanveer starts from Point B and drives 2 km west, then 4 km north, then 5 km west, then 3 km north, then 7 km east. What is the shortest distance and direction to reach Point B again?`,
options: ["5 km south","7 km south","6 km south","4 km south"],
answer: "7 km south"
},
{
question: `Poonam sold a book at a loss of 5 percent and Mohini sold it at a profit of 8 percent. If final price is 1539 rupees, what was original cost price?`,
options: ["1600","1550","1500","1650"],
answer: "1500"
}
];

let currentQuestion = 0;
let userAnswers = new Array(questions.length).fill(null);
let timeLeft = 540; // 9 minutes

function loadQuestion() {
    document.getElementById("questionText").innerText =
        (currentQuestion + 1) + ". " + questions[currentQuestion].question;

    const optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML = "";

    questions[currentQuestion].options.forEach(option => {
        let checked = userAnswers[currentQuestion] === option ? "checked" : "";
        optionsDiv.innerHTML += `
            <input type="radio" name="option" value="${option}" ${checked}
            onclick="saveAnswer('${option}')"> ${option}<br>`;
    });
}

function saveAnswer(option) {
    userAnswers[currentQuestion] = option;
}

function nextQuestion() {
    if (currentQuestion < questions.length - 1) {
        currentQuestion++;
        loadQuestion();
    }
}

function prevQuestion() {
    if (currentQuestion > 0) {
        currentQuestion--;
        loadQuestion();
    }
}

function submitQuiz() {
    clearInterval(timer);

    let attempted = 0;
    let correct = 0;

    userAnswers.forEach((ans, index) => {
        if (ans !== null) {
            attempted++;
            if (ans === questions[index].answer) {
                correct++;
            }
        }
    });

    let wrong = attempted - correct;
    let marks = correct; // no negative marking yet

    document.getElementById("examPage").style.display = "none";
    document.getElementById("resultPage").style.display = "block";

    document.getElementById("attempted").innerText = "Attempted: " + attempted;
    document.getElementById("correct").innerText = "Correct: " + correct;
    document.getElementById("wrong").innerText = "Wrong: " + wrong;
    document.getElementById("marks").innerText = "Marks: " + marks + " / " + questions.length;
}

let timer = setInterval(function() {
    let minutes = Math.floor(timeLeft / 60);
    let seconds = timeLeft % 60;

    document.getElementById("timer").innerText =
        "Time Left: " + minutes + ":" +
        (seconds < 10 ? "0" : "") + seconds;

    timeLeft--;

    if (timeLeft < 0) {
        submitQuiz();
    }
}, 1000);

loadQuestion();

</script>

</body>
</html>
