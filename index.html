<!DOCTYPE html>
<html>
<head>
    <title>RRB JE Mini Mock Test</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        #timer { font-size: 20px; color: red; margin-bottom: 20px; }
        button { padding: 8px 15px; margin: 5px; }
        #resultPage { display: none; }
    </style>
</head>
<body>

<h2>RRB JE Mini Mock Test</h2>
<div id="timer"></div>

<div id="examPage">
    <p id="questionText"></p>
    <div id="options"></div>

    <button onclick="prevQuestion()">Previous</button>
    <button onclick="nextQuestion()">Next</button>
    <button onclick="submitQuiz()">Submit Test</button>
</div>

<div id="resultPage">
    <h2>Score Card</h2>
    <p id="attempted"></p>
    <p id="correct"></p>
    <p id="wrong"></p>
    <p id="marks"></p>
</div>

<script>

const questions = [
{
question: "Energy transfer from outside body is called _______.",
options: ["excretion","respiration","digestion","nutrition"],
answer: "nutrition"
},
{
question: "Truck average speed problem (answer 126).",
options: ["126","141","101","106"],
answer: "126"
},
{
question: "Simple interest problem (answer 40).",
options: ["41","38","39","40"],
answer: "40"
},
{
question: "FCA HEC JGE LIG ?",
options: ["NKI","NKJ","NLJ","NLI"],
answer: "NKI"
},
{
question: "Rajesh rank problem.",
options: ["61","60","59","58"],
answer: "60"
},
{
question: "Circular seating S and X?",
options: ["Two","One","Three","Four"],
answer: "Three"
},
{
question: "Pipe half tank?",
options: ["5","10","6","11"],
answer: "5"
},
{
question: "Circular D and G?",
options: ["Four","One","Two","Three"],
answer: "Two"
},
{
question: "Tanveer direction?",
options: ["5 km south","7 km south","6 km south","4 km south"],
answer: "7 km south"
},
{
question: "Book cost price?",
options: ["1600","1550","1500","1650"],
answer: "1500"
}
];

let currentQuestion = 0;
let userAnswers = new Array(questions.length).fill(null);
let timeLeft = 540;

function loadQuestion() {
    document.getElementById("questionText").innerText =
        (currentQuestion + 1) + ". " + questions[currentQuestion].question;

    let optionsHTML = "";
    questions[currentQuestion].options.forEach(option => {
        let checked = userAnswers[currentQuestion] === option ? "checked" : "";
        optionsHTML +=
            "<input type='radio' name='option' value='" + option + "' " + checked +
            " onclick='saveAnswer(\"" + option + "\")'> " + option + "<br>";
    });

    document.getElementById("options").innerHTML = optionsHTML;
}

function saveAnswer(option) {
    userAnswers[currentQuestion] = option;
}

function nextQuestion() {
    if (currentQuestion < questions.length - 1) {
        currentQuestion++;
        loadQuestion();
    }
}

function prevQuestion() {
    if (currentQuestion > 0) {
        currentQuestion--;
        loadQuestion();
    }
}

function submitQuiz() {
    clearInterval(timer);

    let attempted = 0;
    let correct = 0;

    for (let i = 0; i < questions.length; i++) {
        if (userAnswers[i] !== null) {
            attempted++;
            if (userAnswers[i] === questions[i].answer) {
                correct++;
            }
        }
    }

    let wrong = attempted - correct;
    let marks = correct;

    document.getElementById("examPage").style.display = "none";
    document.getElementById("resultPage").style.display = "block";

    document.getElementById("attempted").innerText = "Attempted: " + attempted;
    document.getElementById("correct").innerText = "Correct: " + correct;
    document.getElementById("wrong").innerText = "Wrong: " + wrong;
    document.getElementById("marks").innerText = "Marks: " + marks + " / " + questions.length;
}

let timer = setInterval(function() {
    let minutes = Math.floor(timeLeft / 60);
    let seconds = timeLeft % 60;

    document.getElementById("timer").innerText =
        "Time Left: " + minutes + ":" +
        (seconds < 10 ? "0" : "") + seconds;

    timeLeft--;

    if (timeLeft < 0) {
        submitQuiz();
    }
}, 1000);

loadQuestion();

</script>

</body>
</html>
